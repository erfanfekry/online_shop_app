{% block title %}Login Form{% endblock %}
{% block content %}
    <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <input type="submit" value="OK">
    </form>

    {% if messages %}
        {% for message in messages %}
            {% if message.tags == 'error' %}
                <ul>
                    <li>{{ message }}</li>
                </ul>
            {% endif %}
        {% endfor %}
    {% endif %}
{% endblock %}
